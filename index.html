<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Show Viewing Experiment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <p class="experiment-note">This page is for a human interaction experiment.</p>
  <header>
    <div class="title-area">
      <h1>Fashion Show Viewing Experiment</h1>
      <p class="group-links">
        <a class="group-btn group-p" href="https://forms.gle/GBEuZthSKsBztWo1A" target="_blank" rel="noopener noreferrer">Group P</a>
        <a class="group-btn group-a" href="https://forms.gle/azq9LWfygiLZknTT6" target="_blank" rel="noopener noreferrer">Group A</a>
      </p>
    </div>
    <img src="data/snapcode.png" alt="Snapcode" class="snapcode">
  </header>
  <main>
    <section id="movies-section" class="hidden">
      <header class="section-header">
        <h2>Movies</h2>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-movies">
          <span class="toggle-slider"></span>
        </label>
      </header>
      <div class="grid">
        <figure class="video-card">
          <div class="label">01</div>
          <video src="data/02.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">02</div>
          <video src="data/04.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">03(shirt only)</div>
          <video src="data/black_white_shirt.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">04</div>
          <video src="data/gray_jacket.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">05</div>
          <video src="data/brown_sweater.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
      </div>
    </section>

    <section id="clothes-section" class="hidden">
      <header class="section-header">
        <h2>Clothes</h2>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-clothes">
          <span class="toggle-slider"></span>
        </label>
      </header>
      <div class="grid">
        <figure class="image-card">
          <div class="label">01</div>
          <img src="data/static_image/02_top_static.png" alt="Top 01">
        </figure>
        <figure class="image-card">
          <div class="label">02</div>
          <img src="data/static_image/04_top_static.png" alt="Top 02">
        </figure>
        <figure class="image-card">
          <div class="label">03(shirt only)</div>
          <img src="data/static_image/white_shirt_static.png" alt="White Shirt">
        </figure>
        <figure class="image-card">
          <div class="label">04</div>
          <img src="data/static_image/gray_jacket_static.png" alt="Gray Jacket">
        </figure>
        <figure class="image-card">
          <div class="label">05</div>
          <img src="data/static_image/brown_sweater_static.png" alt="Brown Sweater">
        </figure>
      </div>
    </section>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggleInputs = document.querySelectorAll('.toggle-switch input[type="checkbox"]');
      toggleInputs.forEach(input => {
        input.addEventListener('change', function() {
          const sectionId = this.id.replace('toggle-', '') + '-section';
          const section = document.getElementById(sectionId);
          if (section) {
            section.classList.toggle('hidden', !this.checked);
          }
        });
      });
    });
  </script>
</body>
</html>
