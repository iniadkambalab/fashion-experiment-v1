<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Show Viewing Experiment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <p class="experiment-note">This page is for a human interaction experiment.</p>
  <header>
    <div class="title-area">
      <h1>Fashion Show Viewing Experiment</h1>
      <p class="group-links">
        <a class="group-btn group-p" href="https://forms.gle/GBEuZthSKsBztWo1A" target="_blank" rel="noopener noreferrer">Group P</a>
        <a class="group-btn group-a" href="https://forms.gle/azq9LWfygiLZknTT6" target="_blank" rel="noopener noreferrer">Group A</a>
      </p>
    </div>
    <img src="data/snapcode.png" alt="Snapcode" class="snapcode">
  </header>
  <main>
    <section id="movies-section" class="hidden">
      <header class="section-header">
        <h2>Movies</h2>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-movies">
          <span class="toggle-slider"></span>
        </label>
      </header>
      <div class="grid">
        <figure class="video-card">
          <div class="label">01</div>
          <video src="data/02.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">02</div>
          <video src="data/04.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">03(shirt only)</div>
          <video src="data/black_white_shirt.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">04</div>
          <video src="data/gray_jacket.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
        <figure class="video-card">
          <div class="label">05</div>
          <video src="data/jeans.mp4" controls muted loop playsinline preload="metadata"></video>
        </figure>
      </div>
    </section>

    <section id="clothes-section" class="hidden">
      <header class="section-header">
        <h2>Clothes</h2>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-clothes">
          <span class="toggle-slider"></span>
        </label>
      </header>
      <div class="grid">
        <figure class="image-card">
          <div class="label">01</div>
          <div class="image-container">
            <img class="front-img" src="data/static_image/02_top_static.png" alt="Top 01 Front">
            <img class="back-img hidden" src="data/static_image/02_back.png" alt="Top 01 Back">
            <button class="flip-toggle" data-card-id="card-01" title="Front/Back">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 4C6.48 4 2 7.58 2 12s4.48 8 10 8 10-3.58 10-8-4.48-8-10-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 6 15.5 6 14 6.67 14 7.5s.67 1.5 1.5 1.5z"/>
              </svg>
            </button>
          </div>
        </figure>
        <figure class="image-card">
          <div class="label">02</div>
          <div class="image-container">
            <img class="front-img" src="data/static_image/04_top_static.png" alt="Top 02 Front">
            <img class="back-img hidden" src="data/static_image/04_back.png" alt="Top 02 Back">
            <button class="flip-toggle" data-card-id="card-02" title="Front/Back">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 4C6.48 4 2 7.58 2 12s4.48 8 10 8 10-3.58 10-8-4.48-8-10-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 6 15.5 6 14 6.67 14 7.5s.67 1.5 1.5 1.5z"/>
              </svg>
            </button>
          </div>
        </figure>
        <figure class="image-card">
          <div class="label">03(shirt only)</div>
          <div class="image-container">
            <img class="front-img" src="data/static_image/white_shirt_static.png" alt="White Shirt Front">
            <img class="back-img hidden" src="data/static_image/white_shirt_back.png" alt="White Shirt Back">
            <button class="flip-toggle" data-card-id="card-03" title="Front/Back">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 4C6.48 4 2 7.58 2 12s4.48 8 10 8 10-3.58 10-8-4.48-8-10-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 6 15.5 6 14 6.67 14 7.5s.67 1.5 1.5 1.5z"/>
              </svg>
            </button>
          </div>
        </figure>
        <figure class="image-card">
          <div class="label">04</div>
          <div class="image-container">
            <img class="front-img" src="data/static_image/gray_jacket_static.png" alt="Gray Jacket Front">
            <img class="back-img hidden" src="data/static_image/gray_jacket_back.png" alt="Gray Jacket Back">
            <button class="flip-toggle" data-card-id="card-04" title="Front/Back">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 4C6.48 4 2 7.58 2 12s4.48 8 10 8 10-3.58 10-8-4.48-8-10-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 6 15.5 6 14 6.67 14 7.5s.67 1.5 1.5 1.5z"/>
              </svg>
            </button>
          </div>
        </figure>
        <figure class="image-card">
          <div class="label">05</div>
          <div class="image-container">
            <img class="front-img" src="data/static_image/jeans_static.png" alt="Jeans Front">
            <img class="back-img hidden" src="data/static_image/jeans_back_static.png" alt="Jeans Back">
            <button class="flip-toggle" data-card-id="card-05" title="Front/Back">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 4C6.48 4 2 7.58 2 12s4.48 8 10 8 10-3.58 10-8-4.48-8-10-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 6 15.5 6 14 6.67 14 7.5s.67 1.5 1.5 1.5z"/>
              </svg>
            </button>
          </div>
        </figure>
      </div>
    </section>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggleInputs = document.querySelectorAll('.toggle-switch input[type="checkbox"]');
      toggleInputs.forEach(input => {
        input.addEventListener('change', function() {
          const sectionId = this.id.replace('toggle-', '') + '-section';
          const section = document.getElementById(sectionId);
          if (section) {
            section.classList.toggle('hidden', !this.checked);
          }
        });
      });

      const flipButtons = document.querySelectorAll('.flip-toggle');
      flipButtons.forEach(button => {
        button.addEventListener('click', function() {
          const container = this.parentElement;
          const frontImg = container.querySelector('.front-img');
          const backImg = container.querySelector('.back-img');

          frontImg.classList.toggle('hidden');
          backImg.classList.toggle('hidden');
        });
      });
    });
  </script>
</body>
</html>
